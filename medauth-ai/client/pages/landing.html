<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Landing - MedAuth AI</title>
  <link rel="stylesheet" href="../assets/styles.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.development.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.development.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.7/axios.min.js"></script>
</head>
<body>
  <!-- Orbs for background -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div id="nav-placeholder"></div>
  <div id="root"></div>

  <script type="text/babel">
    const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://localhost:3001' : window.location.origin;

    gsap.registerPlugin(ScrollTrigger);

    window.navigateTo = (url) => {
      gsap.to('body', {opacity: 0, y: -20, duration: 0.3, ease: 'power2.in', onComplete: () => {
        window.location.href = url;
      }});
    };

    fetch('../components/navbar.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('nav-placeholder').innerHTML = html;
      });

    const { useEffect, useState } = React;

    function Landing() {
      useEffect(() => {
        window.addEventListener('pageshow', (e) => { if (e.persisted) gsap.set('body', {opacity: 1, y: 0, scale: 1}); });
        gsap.fromTo('body', {opacity: 0, y: 20}, {opacity: 1, y: 0, duration: 0.5, ease: 'power2.out'});

        gsap.fromTo('.hero-word', 
            {y: 80, opacity: 0, rotateX: -40}, 
            {y: 0, opacity: 1, rotateX: 0, stagger: 0.12, duration: 0.9, ease: 'power4.out', transformOrigin: 'bottom'}
        );
        gsap.fromTo('.stat-pill', {scale: 0.8, opacity: 0}, {scale: 1, opacity: 1, stagger: 0.1, delay: 0.8});

        let st1 = gsap.fromTo('.agent-card', 
          {y: 80, opacity: 0},
          { scrollTrigger: { trigger: '#agents-section', start: 'top 80%' }, y: 0, opacity: 1, stagger: 0.15 }
        );

        let st2 = gsap.fromTo('.problem-step-old', 
          {x: -40, opacity: 0},
          { scrollTrigger: { trigger: '#problem-section', start: 'top 70%' }, x: 0, opacity: 1, stagger: 0.1 }
        );
        let st3 = gsap.fromTo('.problem-step-new', 
          {x: 40, opacity: 0},
          { scrollTrigger: { trigger: '#problem-section', start: 'top 70%' }, x: 0, opacity: 1, stagger: 0.1, delay: 0.5 }
        );
        
        gsap.fromTo('#countdown-num',
          { innerText: 3000 },
          { 
            scrollTrigger: { trigger: '#problem-section', start: 'top 70%' },
            innerText: 47,
            duration: 2,
            snap: { innerText: 1 },
            ease: "power2.out"
          }
        );
      }, []);

      const title = "From 3 days to 47 seconds.".split(" ");

      return (
        <div className="container" style={{paddingBottom: '100px'}}>
          <div className="hero flex-col align-center justify-center text-center" style={{minHeight: '80vh', marginTop: '2rem'}}>
            <div className="badge badge-blue mb-4" style={{marginBottom: '1rem', border: '1px solid var(--purple)', padding: '6px 16px', borderRadius: '20px'}}>Healthcare AI · Prior Authorization</div>
            <h1 style={{fontSize: '5rem', fontWeight: '800', lineHeight: '1.1', maxWidth: '800px', marginBottom: '1.5rem', perspective: '1000px'}}>
              {title.map((word, i) => (
                <span key={i} className="hero-word" style={{display: 'inline-block', marginRight: word==='to'?'1rem':'1rem'}}>{word}</span>
              ))}
            </h1>
            <p style={{fontSize: '1.5rem', color: 'var(--text-muted)', marginBottom: '3rem', maxWidth: '600px'}}>
              4 AI agents. Zero paperwork. Instant decisions.
            </p>
            
            <div className="flex gap-4" style={{marginBottom: '4rem'}}>
              <button className="btn btn-primary" onClick={() => navigateTo('select-user.html')} style={{fontSize: '1.2rem', padding: '16px 32px'}}>Start New Case &rarr;</button>
              <button className="btn btn-outline" onClick={() => navigateTo('dashboard.html')} style={{fontSize: '1.2rem', padding: '16px 32px'}}>View Dashboard</button>
            </div>

            <div className="flex gap-6 justify-center">
              <div className="stat-pill"><span style={{color: 'var(--green)'}}>↑</span> 14hrs/week saved per doctor</div>
              <div className="stat-pill"><span style={{color: 'var(--blue)'}}>★</span> 94% patient satisfaction</div>
              <div className="stat-pill"><span style={{color: 'var(--amber)'}}>↓</span> 89% cost reduction</div>
            </div>
          </div>

          <div id="problem-section" className="grid gap-8" style={{gridTemplateColumns: '1fr auto 1fr', padding: '100px 0', alignItems: 'center'}}>
            <div className="card" style={{borderColor: 'rgba(239, 68, 68, 0.3)', background: 'rgba(239, 68, 68, 0.05)'}}>
              <h3 style={{color: 'var(--red)', marginBottom: '1rem', fontSize: '1.5rem'}}>The Old Way</h3>
              {['Fax medical records', 'Wait 3-5 days in queue', 'Nurse manually reviews criteria', 'Missing docs? Fax again', 'Decision via mail'].map((t,i) => (
                <div key={i} className="problem-step-old flex gap-4 align-center mt-4" style={{fontSize: '1.1rem'}}>
                  <div style={{color: 'var(--red)', background: 'rgba(239,68,68,0.1)', padding:'4px 8px', borderRadius:'6px'}}>✖</div> <div>{t}</div>
                </div>
              ))}
            </div>

            <div className="text-center" style={{padding: '0 40px'}}>
              <div style={{fontSize: '1rem', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '2px'}}>Time to Decision</div>
              <div style={{fontSize: '6rem', fontWeight: '800', color: 'var(--purple)', lineHeight: '1'}}>
                <span id="countdown-num">3000</span><span style={{fontSize: '2rem'}}>sec</span>
              </div>
            </div>

            <div className="card" style={{borderColor: 'rgba(16, 185, 129, 0.3)', background: 'rgba(16, 185, 129, 0.05)'}}>
              <h3 style={{color: 'var(--green)', marginBottom: '1rem', fontSize: '1.5rem'}}>The AI Way</h3>
              {['Drag and drop PDF', 'AI extracts structured data', 'AI assesses clinicals & rules', 'Instant 47s decision'].map((t,i) => (
                 <div key={i} className="problem-step-new flex gap-4 align-center mt-4" style={{fontSize: '1.1rem'}}>
                  <div style={{color: 'var(--green)', background: 'rgba(16,185,129,0.1)', padding:'4px 8px', borderRadius:'6px'}}>✔</div> <div>{t}</div>
                </div>
              ))}
            </div>
          </div>

          <div id="agents-section" style={{padding: '80px 0'}}>
            <h2 className="text-center" style={{fontSize: '2.5rem', marginBottom: '3rem'}}>Meet the Multi-Agent System</h2>
            <div className="grid gap-6" style={{gridTemplateColumns: 'repeat(4, 1fr)'}}>
              <div className="card agent-card flex-col" style={{borderTop: '4px solid var(--teal)'}}>
                <div className="badge badge-green" style={{alignSelf: 'flex-start', marginBottom: '1rem'}}>Document Agent</div>
                <h3 className="gap-2 flex align-center" style={{fontSize: '1.4rem'}}><span style={{fontSize: '1.8rem'}}>📄</span> Parser</h3>
                <p className="mt-4" style={{color: 'var(--text-muted)', fontSize: '0.95rem', flex: 1}}>Extracts structured JSON data seamlessly from raw medical PDFs.</p>
                <div className="mt-4 badge" style={{background: 'var(--bg2)', color: 'var(--teal)', alignSelf:'flex-start'}}>10 sec avg</div>
              </div>
              <div className="card agent-card flex-col" style={{borderTop: '4px solid var(--blue)'}}>
                <div className="badge badge-blue" style={{alignSelf: 'flex-start', marginBottom: '1rem'}}>Clinical Agent</div>
                <h3 className="gap-2 flex align-center" style={{fontSize: '1.4rem'}}><span style={{fontSize: '1.8rem'}}>⚕️</span> Necessity</h3>
                <p className="mt-4" style={{color: 'var(--text-muted)', fontSize: '0.95rem', flex: 1}}>Assesses justification according to clinical indicators and history.</p>
                <div className="mt-4 badge" style={{background: 'var(--bg2)', color: 'var(--blue)', alignSelf:'flex-start'}}>5 sec avg</div>
              </div>
              <div className="card agent-card flex-col" style={{borderTop: '4px solid var(--amber)'}}>
                 <div className="badge badge-amber" style={{alignSelf: 'flex-start', marginBottom: '1rem'}}>Policy Agent</div>
                <h3 className="gap-2 flex align-center" style={{fontSize: '1.4rem'}}><span style={{fontSize: '1.8rem'}}>🛡️</span> Compliance</h3>
                <p className="mt-4" style={{color: 'var(--text-muted)', fontSize: '0.95rem', flex: 1}}>Matches procedure requests against exact insurer rule sets.</p>
                <div className="mt-4 badge" style={{background: 'var(--bg2)', color: 'var(--amber)', alignSelf:'flex-start'}}>5 sec avg</div>
              </div>
              <div className="card agent-card flex-col" style={{borderTop: '4px solid var(--coral)'}}>
                <div className="badge badge-red" style={{alignSelf: 'flex-start', marginBottom: '1rem'}}>Escalation Agent</div>
                <h3 className="gap-2 flex align-center" style={{fontSize: '1.4rem'}}><span style={{fontSize: '1.8rem'}}>⚖️</span> Oversight</h3>
                <p className="mt-4" style={{color: 'var(--text-muted)', fontSize: '0.95rem', flex: 1}}>Scores confidence and redirects high-risk cases to human doctors.</p>
                <div className="mt-4 badge" style={{background: 'var(--bg2)', color: 'var(--coral)', alignSelf:'flex-start'}}>2 sec avg</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Landing />);
  </script>
</body>
</html>
