services:
  - type: web
    name: medauth-ai
    env: node
    buildCommand: cd medauth-ai/server && npm install
    startCommand: cd medauth-ai/server && node seed/seedInsurers.js && node index.js
    envVars:
      - key: PORT
        value: "3001"
      - key: NODE_ENV
        value: "production"
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: AI_MODEL
        value: "gemini-2.0-flash"
      - key: MONGODB_URI
        sync: false
